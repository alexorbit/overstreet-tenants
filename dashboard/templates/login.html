{% extends "base.html" %}
{% block title %}Login — OverStreet{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-brand-600 text-white text-xl font-bold mb-3">O</div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">OverStreet Admin</h1>
      <p class="text-slate-500 mt-1">Entre com sua senha para continuar.</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 rounded-lg bg-rose-50 border border-rose-200 text-sm text-rose-700">{{ error }}</div>
    {% endif %}

    <form method="post" class="bg-white rounded-2xl border border-slate-200 p-6 space-y-4">
      <div>
        <label class="text-sm font-medium text-slate-900">Senha</label>
        <input type="password" name="password" required autofocus class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <button class="w-full px-4 py-2.5 rounded-lg bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
