{% extends "base.html" %}
{% block title %}Novo follow-up — OverStreet{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="mb-6">
    <a href="/followups" class="text-sm text-slate-500 hover:text-slate-700">← Voltar</a>
    <h1 class="text-2xl font-bold tracking-tight text-slate-900 mt-2">Novo follow-up</h1>
  </div>

  {% if error %}
  <div class="mb-4 p-3 rounded-lg bg-rose-50 border border-rose-200 text-sm text-rose-700">{{ error }}</div>
  {% endif %}

  <form method="post" class="space-y-4 bg-white rounded-xl border border-slate-200 p-6">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm font-medium text-slate-900">Tipo</label>
        <select name="tipo" required class="mt-2 w-full px-3 py-2 rounded-lg border border-slate-200 text-sm bg-white">
          <option value="ligar">Ligar</option>
          <option value="visita">Visita</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="email">E-mail</option>
          <option value="retorno">Retorno</option>
        </select>
      </div>
      <div>
        <label class="text-sm font-medium text-slate-900">Prazo</label>
        <input name="data_prazo" type="date" required class="mt-2 w-full px-3 py-2 rounded-lg border border-slate-200 text-sm">
      </div>
    </div>
    <div>
      <label class="text-sm font-medium text-slate-900">Descrição</label>
      <input name="descricao" class="mt-2 w-full px-3 py-2 rounded-lg border border-slate-200 text-sm" placeholder="Retornar contato sobre...">
    </div>
    <div>
      <label class="text-sm font-medium text-slate-900">Cliente (opcional)</label>
      <select name="cliente_nome" class="mt-2 w-full px-3 py-2 rounded-lg border border-slate-200 text-sm bg-white">
        <option value="">—</option>
        {% for c in clientes %}<option value="{{ c.nome }}">{{ c.nome }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label class="text-sm font-medium text-slate-900">Imóvel (opcional)</label>
      <select name="imovel_id" class="mt-2 w-full px-3 py-2 rounded-lg border border-slate-200 text-sm bg-white">
        <option value="0">—</option>
        {% for im in imoveis %}<option value="{{ im.id }}">COD {{ im.id }} — {{ im.street or '' }}</option>{% endfor %}
      </select>
    </div>
    <div class="flex justify-end gap-3">
      <a href="/followups" class="px-4 py-2 rounded-lg border border-slate-200 text-slate-700 text-sm font-medium hover:bg-slate-50">Cancelar</a>
      <button class="px-5 py-2 rounded-lg bg-brand-600 text-white text-sm font-medium hover:bg-brand-700">Criar</button>
    </div>
  </form>
</div>
{% endblock %}
