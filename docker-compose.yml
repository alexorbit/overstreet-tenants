version: "3.8"

services:
  overstreet:
    build: .
    container_name: overstreet
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./qdrant_storage:/qdrant_storage
      - whisper_cache:/app/whisper_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/app/.alive"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  whisper_cache:
